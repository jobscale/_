<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>動的ハニカム追加</title>
  <style>
    body {
      background-color: #211;
      color: #bb9;
      margin: 0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #button {
      position: relative;
      background-color: #66f;
      margin: 20px;
      font-size: 1.2rem;
      padding: 10px 20px;
    }
    input {
      padding: 2px 5px;
      border: #66f solid 1px;
      background: rgba(102, 102, 255, 0.7);
      color: #eeb;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <button id="button">Click here!</button>
    </section>
    <section>
      This is a test page for MFA Web TOTP generator.
      <form class="auth-area">
        <label for="otpCode">One Time Password:</label>
        <input type="text" name="otpCode" autocomplete="one-time-code" />
      </form>
    </section>
  </main>
</body>
</html>
